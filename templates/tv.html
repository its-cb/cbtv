<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream CBTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0c;
    color: #f0f0f0;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    gap: 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e8c547;
    box-shadow: 0 0 24px #e8c547;
    animation: pulse 2.4s ease-in-out infinite;
    margin-bottom: 36px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 24px #e8c547; }
    50%       { opacity: 0.35; box-shadow: 0 0 8px #e8c547; }
  }

  .logo {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #e8c547;
    margin-bottom: 56px;
  }

  .divider {
    width: 180px;
    height: 1px;
    background: #2a2a35;
    margin-bottom: 56px;
  }

  .instruction {
    font-size: 26px;
    font-weight: 400;
    color: #666680;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .url {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 400;
    color: #f0f0f0;
    letter-spacing: 0.05em;
  }

  .url .accent { color: #e8c547; }

  .audio {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: #666680;
    letter-spacing: 0.04em;
    margin-top: 16px;
  }

  /* ── Screensaver ── */
  #screensaver {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: none;
    pointer-events: none;
  }

  #screensaver.active { display: block; }

  #ss-logo {
    position: absolute;
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #e8c547;
    white-space: nowrap;
    user-select: none;
  }
</style>
</head>
<body>

<div id="screensaver"><div id="ss-logo">CBTV</div></div>

<div class="dot"></div>
<div class="logo">Stream CBTV</div>
<div class="divider"></div>
<div class="instruction">Open on your phone to stream</div>
<div class="url">
  <span class="accent">http://</span><span id="ip">...</span><span class="accent">:7777</span>
</div>
<div class="audio" id="audio">...</div>

<script>
  function fetchIp() {
    fetch('/api/ip')
      .then(r => r.json())
      .then(data => {
        if (data.ip && data.ip.includes('.')) {
          document.getElementById('ip').textContent = data.ip;
        } else {
          setTimeout(fetchIp, 2000);
        }
        if (data.audio) {
          document.getElementById('audio').textContent = '♪ ' + data.audio;
        }
      })
      .catch(() => setTimeout(fetchIp, 2000));
  }
  fetchIp();

  // ── Screensaver ──────────────────────────────────────────────
  const SS_DELAY = 3 * 60 * 1000; // 3 minutes
  const ss = document.getElementById('screensaver');
  const ssLogo = document.getElementById('ss-logo');
  let ssTimer, rafId;
  let x, y, vx, vy;

  function startBounce() {
    const w = window.innerWidth  - ssLogo.offsetWidth;
    const h = window.innerHeight - ssLogo.offsetHeight;
    x = Math.random() * w;
    y = Math.random() * h;
    const speed = 0.8;
    const angle = Math.random() * 2 * Math.PI;
    vx = Math.cos(angle) * speed;
    vy = Math.sin(angle) * speed;

    let last = null;
    function step(ts) {
      if (!ss.classList.contains('active')) return;
      const dt = last ? Math.min(ts - last, 50) : 16;
      last = ts;
      x += vx * dt;
      y += vy * dt;
      const maxX = window.innerWidth  - ssLogo.offsetWidth;
      const maxY = window.innerHeight - ssLogo.offsetHeight;
      if (x <= 0)    { x = 0;    vx = Math.abs(vx); }
      if (x >= maxX) { x = maxX; vx = -Math.abs(vx); }
      if (y <= 0)    { y = 0;    vy = Math.abs(vy); }
      if (y >= maxY) { y = maxY; vy = -Math.abs(vy); }
      ssLogo.style.transform = `translate(${x}px, ${y}px)`;
      rafId = requestAnimationFrame(step);
    }
    rafId = requestAnimationFrame(step);
  }

  function activateSS() {
    ss.classList.add('active');
    startBounce();
  }

  function dismissSS() {
    ss.classList.remove('active');
    cancelAnimationFrame(rafId);
    resetTimer();
  }

  function resetTimer() {
    clearTimeout(ssTimer);
    ssTimer = setTimeout(activateSS, SS_DELAY);
  }

  document.addEventListener('mousemove', dismissSS);
  document.addEventListener('keydown',   dismissSS);
  document.addEventListener('click',     dismissSS);
  resetTimer();
</script>
</body>
</html>
